# Builds standalone binaries for Linux, Windows and macOS via PyInstaller
# whenever a ``v*`` tag is pushed (or this workflow is dispatched
# manually), and publishes the artefacts as a GitHub Release.
#
# PyInstaller doesn't cross-compile, so we run one job per OS via a
# matrix and rely on GitHub-hosted runners. ``ports.csv`` is bundled
# explicitly with ``--add-data`` because ``scanner.load_ports_registry``
# resolves it relative to ``__file__``; without that flag the "Порты"
# dialog would silently come up empty in the packaged build.
name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  # Required by softprops/action-gh-release to create / update Releases.
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      # One bad runner shouldn't kill the other two — release artefacts
      # for the OSes that did build are still useful.
      fail-fast: false
      matrix:
        include:
          # We split out ``data_sep`` (``:`` POSIX, ``;`` Windows) so the
          # build step can quote the full ``--add-data`` value instead
          # of relying on YAML / shell to preserve ``;`` correctly.
          # That ``;`` is a statement separator in PowerShell *and*
          # bash, so any unquoted form gets shredded on Windows.
          - os: ubuntu-latest
            artifact_name: IPbrowse-linux-x64.AppImage
            # Build with --onedir on Linux because AppImage wraps a
            # directory of binaries + libs rather than a self-extracting
            # blob. Wrapping a --onefile output inside AppImage would
            # double-unpack at startup for no benefit.
            pyinstaller_extra: --onedir --name IPbrowse
            data_sep: ":"
            built_path: dist/IPbrowse
            packager: appimage
          - os: windows-latest
            artifact_name: IPbrowse-windows-x64.exe
            pyinstaller_extra: --windowed --onefile --name IPbrowse
            data_sep: ";"
            built_path: dist/IPbrowse.exe
            packager: none
          - os: macos-latest
            artifact_name: IPbrowse-macos-arm64.zip
            # ``--windowed`` on macOS produces a proper ``.app`` bundle
            # rather than a bare CLI binary; we zip it below because
            # GitHub Releases can only host flat files.
            pyinstaller_extra: --windowed --name IPbrowse
            data_sep: ":"
            built_path: dist/IPbrowse.app
            packager: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # PySide6 wheels link against libegl/libgl on Linux runners; without
      # them PyInstaller's import-analysis pass for ``PySide6.QtWidgets``
      # fails before producing the bundle. Other OSes ship the equivalent
      # libraries by default.
      - name: Install Linux Qt deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # We always run the build under bash (Git Bash on Windows
      # runners) and quote the full ``--add-data`` value here,
      # rather than baking it into ``matrix.pyinstaller_args``.
      # ``;`` is a statement separator in both PowerShell and bash;
      # leaving it unquoted made PyInstaller see only
      # ``--add-data=ports.csv`` and bash try to dot-source
      # ``app.py``. Wrapping the value in single quotes inside the
      # script keeps ``;`` literal regardless of which interpreter
      # ends up parsing it.
      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller ${{ matrix.pyinstaller_extra }} \
            --add-data="ports.csv${{ matrix.data_sep }}." \
            app.py

      - name: Stage Windows binary
        if: matrix.packager == 'none'
        shell: bash
        run: |
          mv "${{ matrix.built_path }}" "${{ matrix.artifact_name }}"

      - name: Zip macOS .app bundle
        if: matrix.packager == 'zip'
        run: |
          cd dist
          # Preserve the .app's internal symlinks (``-y``) so launching
          # it after unzip still works on the user's Mac.
          zip -ry "../${{ matrix.artifact_name }}" "$(basename '${{ matrix.built_path }}')"

      # ---- Linux: wrap PyInstaller --onedir output into an AppImage ----
      # AppImage gives a single self-contained file that runs on any
      # modern glibc-based distro without the user having to install
      # Qt / Python. ``appimagetool`` expects an AppDir layout with an
      # AppRun entry point, a top-level .desktop file, and a top-level
      # icon; we construct those around the PyInstaller output.
      - name: Package Linux AppImage
        if: matrix.packager == 'appimage'
        run: |
          set -euo pipefail

          # 1. appimagetool is itself an AppImage, so it needs libfuse2
          # at runtime on the runner. The Qt libs were already fetched
          # by the earlier apt-get step for the PyInstaller build.
          sudo apt-get install -y libfuse2

          # 2. Lay out the AppDir. PyInstaller puts the binary +
          # _internal/ alongside each other in dist/IPbrowse/; we drop
          # that into usr/bin/ and then symlink the executable to the
          # root as AppRun.
          APPDIR=IPbrowse.AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp -r dist/IPbrowse/. "$APPDIR/usr/bin/"

          # 3. AppRun is the entry point appimagetool invokes. A shell
          # wrapper lets us forward the user's CWD and any arguments
          # they pass without PyInstaller losing track of resource
          # paths.
          cat > "$APPDIR/AppRun" <<'APPRUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/IPbrowse" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          # 4. Required metadata: .desktop entry + top-level icon.
          cat > "$APPDIR/IPbrowse.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=IPbrowse
          Comment=Сканер локальной сети
          Exec=IPbrowse
          Icon=IPbrowse
          Categories=Network;System;
          Terminal=false
          DESKTOP
          cp resources/icon.png "$APPDIR/IPbrowse.png"

          # 5. Fetch appimagetool. The ``continuous`` release is the
          # recommended stable build for scripts — pin by sha256 if
          # supply-chain strictness ever matters.
          curl -fsSL -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          # 6. ARCH env var is how appimagetool decides the embedded
          # runtime; without it the tool refuses to build on CI.
          ARCH=x86_64 ./appimagetool "$APPDIR" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 14

  release:
    # Only create a Release for tag-pushed builds; manual dispatches
    # still produce downloadable artefacts via the run page, but won't
    # auto-publish a Release.
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ``download-artifact`` lays out files as
      # ``artifacts/<name>/<name>``. Flatten that into a single dir so
      # the Release upload step sees one file per binary.
      - name: Flatten artefact tree
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
